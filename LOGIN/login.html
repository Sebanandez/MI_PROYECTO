</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <h1>TCG Vault</h1>
            </div>
            <ul class="nav-principal">
                <li><a href="../index.html">Inicio</a></li>
                
                <li class="menu-desplegable">
                    <a href="#">Juegos TCG <small>▼</small></a>
                    <ul class="sub-menu">
                        <li><a href="../POKEMON/pokemon.html">Pokémon TCG</a></li>
                        <li><a href="../MAGIC/magic.html">Magic: The Gathering</a></li>

                        <li><a href="../OTROS/otros.html">Otros</a></li>

                </li>
                
                <li><a href="../CONTACTO/contacto.html">Contacto</a></li>
                <li><a href="login.html">Mi Cuenta</a></li>
                <li><a href="#carrito" class="btn-carrito">🛒 Mi Carrito (0)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contenedor-auth">
            
            <div class="bloque-auth">
                <h3>Iniciar Sesión</h3>
                <form class="formulario">
                    <div class="grupo-input">
                        <label for="login-email">Correo Electrónico:</label>
                        <input type="email" id="login-email" required placeholder="tu@email.com">
                    </div>
                    <div class="grupo-input">
                        <label for="login-pass">Contraseña:</label>
                        <input type="password" id="login-pass" required placeholder="******">
                    </div>
                    <button type="submit">Ingresar</button>
                </form>
            </div>

            <div class="bloque-auth">
                <h3>Crear Cuenta</h3>
                <form class="formulario">
                    <div class="grupo-input">
                        <label for="reg-nombre">Nombre Completo:</label>
                        <input type="text" id="reg-nombre" required placeholder="Tu nombre">
                    </div>
                    <div class="grupo-input">
                        <label for="reg-email">Correo Electrónico:</label>
                        <input type="email" id="reg-email" required placeholder="tu@email.com">
                    </div>
                    <div class="grupo-input">
                        <label for="reg-pass">Contraseña:</label>
                        <input type="password" id="reg-pass" required placeholder="Crea una contraseña">
                    </div>
                    <button type="submit">Registrarse</button>
                </form>
            </div>
            
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TCG Vault. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
