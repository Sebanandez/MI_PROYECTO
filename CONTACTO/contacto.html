<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - TCG Vault</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <h1>TCG Vault</h1>
            </div>
            <ul class="nav-principal">
                <li><a href="../index.html#inicio">Inicio</a></li>
                <li><a href="../index.html#productos">Productos</a></li>
                <li><a href="../index.html#resenas">Reseñas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contacto" class="seccion-contacto">
            <h2 class="titulo-seccion">Contacto</h2>
            <p class="subtitulo-contacto">¿Buscás alguna promo de 151 o querés vender tus cartas? Escribinos:</p>
            
            <form action="https://formspree.io/f/tu_id_formspree" method="POST" class="formulario">
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="name" required placeholder="Tu nombre">
                </div>

                <div class="grupo-input">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="grupo-input">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="message" rows="5" required placeholder="¿Qué cartas estás buscando?"></textarea>
                </div>

                <button type="submit">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TCG Vault - Buenos Aires, Argentina. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
